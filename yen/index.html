<!DOCTYPE html>
<html lang="th" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yen to THB Visual Calculator | Version 1.1.2</title>
    
    <!-- ===== PWA Meta Tags ===== -->
    <meta name="theme-color" content="#7c6fea">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="manifest" href="./manifest.json">
    
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;300;400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] },
                    colors: {
                        mainBrand: '#7c6fea', 
                        darkBg: '#0d0f1e',
                        darkCard: '#1e1a3a',
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-font-smoothing: antialiased; }
        .hide-arrows::-webkit-outer-spin-button, .hide-arrows::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .hide-arrows { -moz-appearance: textfield; appearance: textfield; }

        @keyframes popIn { 0% { transform: scale(0.5) translateY(10px); opacity: 0; } 70% { transform: scale(1.05) translateY(-2px); opacity: 1; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
        .animate-pop { opacity: 0; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .paper-bill { aspect-ratio: 2 / 1; box-shadow: 0px 3px 5px rgba(0, 0, 0, 0.2), inset 0 0 0 1px rgba(255,255,255,0.4); background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px); }
        .coin-metal { box-shadow: 0px 4px 5px rgba(0, 0, 0, 0.3), inset 0 -3px 4px rgba(0,0,0,0.1), inset 0 2px 4px rgba(255,255,255,0.7); }

        .bg-grid { background-size: 40px 40px; background-image: linear-gradient(to right, rgba(124, 111, 234, 0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(124, 111, 234, 0.05) 1px, transparent 1px); }
        
        .expand-panel { transition: max-height 0.5s ease, opacity 0.5s ease, padding 0.5s ease; max-height: 0; opacity: 0; overflow: hidden; padding-top: 0; padding-bottom: 0; }
        .expand-panel.open { max-height: 1000px; opacity: 1; padding-top: 1.5rem; padding-bottom: 1.5rem; overflow-y: auto;} 
        
        .best-value { border-color: #34d399 !important; background-color: rgba(52, 211, 153, 0.1) !important; }
    </style>
</head>
<body class="bg-blue-50 dark:bg-darkBg min-h-screen text-slate-800 dark:text-blue-100 font-sans p-4 md:p-8 flex justify-center items-start bg-grid transition-colors duration-500 pb-12 relative">

    <div id="error-toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 -translate-y-24 opacity-0 bg-slate-800/95 backdrop-blur-md text-white px-6 py-3 rounded-2xl shadow-2xl z-[100] transition-all duration-500 font-bold text-sm max-w-[90vw] text-center border border-slate-700">
        <span id="error-toast-msg"></span>
    </div>

    <div class="w-full max-w-2xl bg-white dark:bg-darkCard rounded-[2.5rem] shadow-2xl overflow-hidden mt-2 md:mt-6 border border-blue-100 dark:border-blue-900/30 transition-all duration-500 relative z-10">
        
        <!-- Header -->
        <div class="bg-mainBrand dark:bg-indigo-950 p-6 text-white relative overflow-hidden transition-colors">
            <div class="absolute -top-10 -right-10 text-9xl opacity-10 font-black">💴</div>
            <div class="flex justify-between items-center relative z-10">
                <div class="flex items-center gap-4">
                    <a href="/" class="w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-2xl transition-all border border-white/20 shadow-lg text-2xl group">
                        <span class="group-hover:scale-125 transition-transform">🏠</span>
                    </a>
                    <div class="text-left">
                        <h1 class="text-2xl sm:text-3xl font-black tracking-tight mb-0.5">Yen Calculator</h1>
                        <div id="rate-display" class="text-blue-100 text-[10px] sm:text-xs font-bold bg-black/10 inline-block px-3 py-0.5 rounded-full animate-pulse">กำลังดึงข้อมูลเรทเงิน...</div>
                    </div>
                </div>
                <button onclick="toggleDarkMode()" class="p-3 bg-white/10 hover:bg-white/20 rounded-full transition-all border border-white/20 shadow-lg group">
                    <span id="theme-icon" class="text-xl">☀️</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="p-6 md:p-8">
            <div class="bg-slate-50 dark:bg-blue-900/10 border-2 border-blue-100 dark:border-blue-900/30 rounded-3xl p-6 md:p-8 mb-8 relative shadow-inner transition-all duration-500" id="wallet-backdrop">
                <div id="wallet-title" class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-white dark:bg-indigo-900 px-4 py-1.5 border-2 border-blue-100 dark:border-blue-800 rounded-full text-[10px] font-black text-blue-500 dark:text-blue-200 tracking-widest shadow-sm whitespace-nowrap z-20 transition-all uppercase">เงินที่ต้องเตรียม (ปัดเศษขึ้น)</div>
                <div id="wallet-container" class="flex flex-wrap gap-4 md:gap-6 justify-center items-center min-h-[120px] mt-2"></div>
            </div>

            <div class="mb-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-4 border-b-2 border-blue-50 dark:border-blue-900/20 pb-2 gap-3">
                    <h2 class="text-xl font-bold text-mainBrand dark:text-blue-300 flex items-center gap-2 tracking-tight"><span>🛒</span> รายการสินค้า</h2>
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <button id="clear-all-btn" class="flex-1 sm:flex-none bg-red-50 dark:bg-red-900/30 text-red-500 border border-red-200 font-black py-1.5 px-4 rounded-2xl text-xs transition-all flex justify-center items-center gap-1.5 active:scale-95">
                            <span>🗑️</span> <span id="clear-btn-text">ล้างทั้งหมด</span>
                        </button>
                        <button id="add-row-btn" class="flex-1 sm:flex-none bg-blue-50 dark:bg-blue-900/40 text-mainBrand dark:text-blue-200 border border-blue-200 font-black py-1.5 px-5 rounded-2xl text-xs transition-all flex justify-center items-center gap-1.5 active:scale-95">
                            <span>+</span> เพิ่มรายการ
                        </button>
                    </div>
                </div>
                <div id="inputs-wrapper" class="space-y-3"></div>
            </div>

            <div class="mt-8 bg-mainBrand dark:bg-indigo-900 rounded-[2rem] p-8 text-white shadow-xl relative overflow-hidden transition-colors">
                <div class="flex flex-col sm:flex-row justify-between items-center sm:items-end gap-6 relative z-10">
                    <div class="text-center sm:text-left">
                        <div class="text-blue-100 text-[10px] font-black uppercase tracking-widest mb-1 font-bold">รวมยอด Yen ทั้งหมด</div>
                        <div class="text-4xl font-black tracking-tighter"><span id="total-jpy">0</span> <span class="text-2xl text-blue-200 font-bold">¥</span></div>
                    </div>
                    <div class="text-center sm:text-right">
                        <div class="text-blue-100 text-[10px] font-black uppercase tracking-widest mb-1 font-bold">เป็นเงินไทย (ปัดเศษ)</div>
                        <div class="text-5xl font-black text-amber-300 drop-shadow-md"><span id="total-thb">0</span> <span class="text-3xl font-bold">฿</span></div>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center">
                <span class="text-[10px] font-black text-slate-300 dark:text-slate-600 uppercase tracking-widest">Version 1.1.2 Offline-First</span>
            </div>
        </div>
    </div>

    <!-- Script Section (Keep same logic) -->
    <script>
        // ... (โค้ด JS เดิมของคุณ) ...
        // แก้ไขส่วน Service Worker registration ให้ตรงกับ sw.js
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW Registered with version 1.1.2');
                }).catch(err => console.log('SW Error:', err));
            });
        }
    </script>
    <!-- หมายเหตุ: ตัวแปร JS อื่นๆ ให้คงไว้ตามเดิมจาก index.html ล่าสุดของคุณ -->
</body>
</html>
