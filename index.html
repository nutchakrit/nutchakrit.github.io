<!DOCTYPE html>
<html lang="th" class="transition-colors duration-500">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCK Server Portal | Crayon Cloud Edition</title>
    
    <!-- ===== PWA Meta Tags ===== -->
    <meta name="theme-color" content="#7c6fea">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
                document.documentElement.classList.add('dark');
            }

            // บอกว่า theme ถูกตั้งแล้ว
            document.documentElement.classList.add('theme-ready');
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Mali', 'sans-serif'] },
                    colors: {
                        bgLight: '#f0f4ff',
                        bgDark: '#0d0f1e',
                        textBlue: '#7c6fea',
                        textDarkBlue: '#a89ff5'
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        
        /* ===== BACKGROUND IMG FIX & FADE TRANSITION ===== */
        .bg-img {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -10;
            opacity: 0;
        }

        /* เมื่อระบบพร้อม ให้ fade in เข้ามา */
        .theme-ready .bg-light {
            opacity: 1;
            transition: opacity 1s ease-in-out;
        }
        .theme-ready .bg-dark {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* สลับ Opacity เมื่อเป็น Dark Mode */
        html.dark.theme-ready .bg-light { opacity: 0; }
        html.dark.theme-ready .bg-dark { opacity: 1; }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        
        body {
            -webkit-font-smoothing: antialiased;
            background-color: #f0f4ff;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            transition: background-color 1s ease-in-out;
        }
        
        body.dark-active { 
            background-color: #0d0f1e; 
        }

        /* ====== STARS (dark only) ====== */
        .stars {
            background-image: 
                radial-gradient(1.5px 1.5px at 8% 12%, #fff, transparent),
                radial-gradient(1px 1px at 22% 35%, #ccd6ff, transparent),
                radial-gradient(2px 2px at 38% 8%, #fff, transparent),
                radial-gradient(1px 1px at 55% 22%, #e0d8ff, transparent),
                radial-gradient(1.5px 1.5px at 70% 15%, #fff, transparent),
                radial-gradient(1px 1px at 88% 30%, #ccd6ff, transparent),
                radial-gradient(1.5px 1.5px at 15% 65%, #fff, transparent),
                radial-gradient(2px 2px at 30% 80%, #e8e0ff, transparent),
                radial-gradient(1px 1px at 78% 72%, #fff, transparent),
                radial-gradient(1.5px 1.5px at 92% 55%, #ccd6ff, transparent),
                radial-gradient(1px 1px at 45% 90%, #fff, transparent),
                radial-gradient(2px 2px at 62% 48%, #e0d8ff, transparent);
            background-size: 100% 100%;
            animation: twinkle 4s ease-in-out infinite alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        /* ====== FLOAT ANIMATIONS ====== */
        @keyframes float      { 0%,100%{transform:translateY(0px);}    50%{transform:translateY(-15px);} }
        @keyframes float-slow { 0%,100%{transform:translateY(0px);}    50%{transform:translateY(-10px);} }
        @keyframes float-fast { 0%,100%{transform:translateY(0px);}    50%{transform:translateY(-20px);} }
        .animate-float      { animation: float      6s ease-in-out infinite; }
        .animate-float-slow { animation: float-slow 8s ease-in-out infinite; }
        .animate-float-fast { animation: float-fast 5s ease-in-out infinite; }

        /* ====== TOOLTIP BUBBLE ====== */
        .tooltip-text { color: #7c6fea; }
        .dark .tooltip-text { color: #c4b8f8; }

        /* ====== CLOUD mix-blend ====== */
        .cloud-blend {
            mix-blend-mode: multiply;
            filter: drop-shadow(0 10px 30px rgba(140, 120, 220, 0.25));
        }
        .dark .cloud-blend {
            mix-blend-mode: screen;
            filter: drop-shadow(0 10px 30px rgba(140, 120, 220, 0.4));
        }

        /* ====== BOTTOM WATERMARK ====== */
        .watermark { color: #a09ad0; }
        .dark .watermark { color: #5a5480; }

        /* ====== OSU-STYLE: cloud pulse before click ====== */
        .cloud-pulse { animation: osu-pulse 2s ease-in-out infinite; }
        @keyframes osu-pulse {
            0%,100% { filter: drop-shadow(0 0 18px rgba(124,111,234,0.35)); }
            50%      { filter: drop-shadow(0 0 40px rgba(124,111,234,0.75)); }
        }
        .cloud-pulse.entered { animation: none; filter: none; }

        /* Ripple burst on click */
        .osu-ripple {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            transform: translate(-50%, -50%) scale(0);
            background: radial-gradient(circle, rgba(180,160,255,0.45) 0%, transparent 70%);
            animation: osu-burst 0.7s ease-out forwards;
        }
        @keyframes osu-burst {
            to { transform: translate(-50%, -50%) scale(6); opacity: 0; }
        }

        /* ====== CSS VARIABLES FOR THEME ====== */
        :root {
            --slider-bg: #d8d0f8;
            --slider-fill: #7c6fea;
        }
        .dark {
            --slider-bg: #4a3e9a;
            --slider-fill: #c4b8f8;
        }

        #volume-slider {
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, var(--slider-fill) 0%, var(--slider-fill) 40%, var(--slider-bg) 40%);
            outline: none;
            cursor: pointer;
        }
        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--slider-fill);
            cursor: pointer;
            box-shadow: 0 0 5px rgba(124,111,234,0.6);
        }
        #volume-slider::-moz-range-thumb {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--slider-fill);
            cursor: pointer;
            border: none;
        }
        @keyframes marquee {
            0%   { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
    </style>
</head>

    <script>
        const html = document.documentElement;
        const body = document.body;
        const themeIcon = document.getElementById('theme-icon');

        function updateSliderBgColor() {
            const volSlider = document.getElementById('volume-slider');
            if(volSlider) {
                const val = volSlider.value;
                volSlider.style.background = `linear-gradient(to right, var(--slider-fill) 0%, var(--slider-fill) ${val}%, var(--slider-bg) ${val}%)`;
            }
        }

        function applyTheme(theme) {
            if (theme === 'dark') {
                html.classList.add('dark');
                body.classList.add('dark-active');
                themeIcon.innerText = '🌙';
            } else {
                html.classList.remove('dark');
                body.classList.remove('dark-active');
                themeIcon.innerText = '☀️';
            }
            updateSliderBgColor();
        }

        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)');
        if (savedTheme) applyTheme(savedTheme);
        else applyTheme(systemPrefersDark.matches ? 'dark' : 'light');

        systemPrefersDark.addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
        });

        function toggleDarkMode() {
            const isDark = html.classList.contains('dark');
            const newTheme = isDark ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        /* ===== ระบบข้อความ NecoMaid (สไตล์เกมจีบสาว) ===== */
        const speechBox = document.getElementById('maid-speech-box');
        const speechText = document.getElementById('speech-text');
        
        // อัปเดตบทสนทนาใหม่ให้เป็นสไตล์ Maid จริงๆ
        const quotes = [
            "ยินดีต้อนรับกลับมาค่ะ นายท่าน ✨",
            "รับชาหรือกาแฟดีคะ? วันนี้ดิฉันเตรียมขนมไว้ให้ด้วยนะ ☕",
            "นายท่านทำงานเหนื่อยไหมคะ? ให้ดิฉันนวดให้เอาไหม 💆‍♀️",
            "ถ้ามีอะไรให้ดิฉันรับใช้ เรียกได้เสมอเลยนะคะ! 💕",
            "วันนี้ท้องฟ้าสดใสจังเลยนะคะ เหมาะกับการพักผ่อนสุดๆ 🌻",
            "ดิฉันทำความสะอาดห้องไว้ให้เรียบร้อยแล้วค่ะ! 🧹",
            "อย่าลืมพักผ่อนบ้างนะคะ นายท่านโหมงานหนักเกินไปแล้วนะ 🥺"
        ];

        function speak() {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            speechText.innerText = randomQuote; // อัปเดตเฉพาะข้อความ ไม่ทับป้ายชื่อ
            
            speechBox.classList.replace('opacity-0','opacity-100');
            speechBox.classList.replace('scale-95','scale-100');
            speechBox.classList.replace('translate-y-4','translate-y-0');
            
            clearTimeout(window.maidTimer);
            window.maidTimer = setTimeout(() => {
                speechBox.classList.replace('opacity-100','opacity-0');
                speechBox.classList.replace('scale-100','scale-95');
                speechBox.classList.replace('translate-y-0','translate-y-4');
            }, 6000);
        }

        /* ===== ระบบจัดการ Playlist Music Player ===== */
        const playlist = [
            { title: 'hatachi-no-koi', src: 'hatachi-no-koi.mp3' },
            { title: 'Aoi-Sangosho', src: 'Aoi-Sangosho.mp3' },
            { title: 'BookEndBossa', src: 'BookEndBossa.mp3' }
        ];
        
        // สุ่มเพลงที่จะเล่นเมื่อเปิด/รีเฟรชหน้าเว็บ
        let currentSongIndex = Math.floor(Math.random() * playlist.length);
        const audio = document.getElementById('bg-music');
        const toggleBtn = document.getElementById('music-toggle');
        const nowPlayingText = document.getElementById('now-playing-text');
        let isPlaying = false;

        audio.volume = 0.4;
        updateSliderBgColor(); 

        function loadSong(index) {
            audio.src = playlist[index].src;
            const text = `🎵 ${playlist[index].title} &nbsp;&nbsp;&nbsp;&nbsp; 🎵 ${playlist[index].title} &nbsp;&nbsp;&nbsp;&nbsp;`;
            nowPlayingText.innerHTML = text;
            if (isPlaying) {
                audio.play().catch(() => {});
            }
        }

        // โหลดเพลงที่สุ่มได้ในครั้งแรก
        loadSong(currentSongIndex);

        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                toggleBtn.textContent = '🔇';
                isPlaying = false;
            } else {
                audio.play().catch(() => {});
                toggleBtn.textContent = '🔊';
                isPlaying = true;
            }
        }

        function setVolume(val) {
            const v = val / 100;
            audio.volume = v;
            updateSliderBgColor();
            if (isPlaying) {
                toggleBtn.textContent = v === 0 ? '🔇' : v < 0.5 ? '🔉' : '🔊';
            }
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % playlist.length;
            loadSong(currentSongIndex);
            if (!isPlaying) toggleMusic(); // เล่นอัตโนมัติเมื่อกดข้าม
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentSongIndex);
            if (!isPlaying) toggleMusic();
        }

        // เมื่อเพลงปัจจุบันจบ ให้เล่นเพลงถัดไปอัตโนมัติ
        audio.addEventListener('ended', nextSong);

        /* ===== เข้าสู่ Portal ===== */
        function enterPortal() {
            if (window._portalEntered) return;
            window._portalEntered = true;

            // เล่นเสียง Effect OnClick ทันที และลดเสียงลง 50%
            const sfxClick = document.getElementById('sfx-click');
            if (sfxClick) {
                sfxClick.volume = 0.5; // กำหนดระดับเสียงที่ 50%
                sfxClick.currentTime = 0; // รีเซ็ตเสียงเผื่อกดย้ำ
                sfxClick.play().catch(()=>{});
            }

            const outerWrap = document.getElementById('main-cloud-wrap');
            if (outerWrap) outerWrap.style.transform = 'scale(1)';

            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const ripple = document.createElement('div');
                    ripple.className = 'osu-ripple';
                    ripple.style.left = '50vw';
                    ripple.style.top  = '50vh';
                    ripple.style.width  = (250 + i * 80) + 'px';
                    ripple.style.height = (250 + i * 80) + 'px';
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 900);
                }, i * 120);
            }

            const cloudImg = document.querySelector('.cloud-pulse');
            if (cloudImg) cloudImg.classList.add('entered');

            const hint = document.getElementById('click-hint');
            if (hint) { hint.style.opacity = '0'; hint.style.transition = 'opacity 0.3s'; }

            const wrap = document.getElementById('main-cloud-wrap');
            if (wrap) { wrap.style.cursor = 'default'; wrap.onclick = null; }

            setTimeout(() => {
                const layer = document.getElementById('menu-layer');
                if (layer) {
                    layer.style.pointerEvents = 'auto';
                    layer.style.opacity = '1';
                }
            }, 200);

            setTimeout(() => {
                const mpWrap = document.getElementById('music-player-wrap');
                if (mpWrap) {
                    mpWrap.style.opacity = '1';
                    mpWrap.style.pointerEvents = 'auto';
                }
            }, 350);

            setTimeout(() => {
                if (audio) {
                    audio.play().then(() => {
                        isPlaying = true;
                        if (toggleBtn) toggleBtn.textContent = '🔊';
                    }).catch(() => {});
                }
            }, 300);

            setTimeout(speak, 900);
        }

        // ===== PWA Service Worker Registration =====
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').then(function(registration) {
                    console.log('PWA: ServiceWorker เตรียมพร้อมทำงานแล้ว! (Scope: ' + registration.scope + ')');
                }).catch(function(err) {
                    console.log('PWA: ServiceWorker ทำงานล้มเหลว: ', err);
                });
            });
        }
    </script>
</body>
</html>
